global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # ============================================
  # РЕАЛЬНЫЕ ТАРГЕТЫ
  # ============================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'iris-model-server'
    static_configs:
      - targets: ['iris-model-server:8000']
    metrics_path: '/metrics'

  - job_name: 'iris-exporter'
    static_configs:
      - targets: ['iris-exporter:9101']
    metrics_path: '/metrics'

